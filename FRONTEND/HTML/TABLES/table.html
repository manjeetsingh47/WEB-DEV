<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <!--
    tr=table row,
    th=table header,
    td=table data,
    caption,
    colspan=number of columns
    -->

</head>
<body>
    <table border="1">    
        <caption>Student Table</caption>

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>Manjeet</td>
            <td>21</td>
            <td>Manjeet@gmail.com</td>
        </tr>
        <tr>
            <td>Akshit</td>
            <td>22</td>
            <td>Akshitt@gmail.com</td>
        </tr>

        <tr>
            <td colspan="2">very good and hardworking students.</td>
        </tr>
    </table>
</body>
</html>
